<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Transfer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* Sidebar Styles */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 250px;
            background: white;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 999;
            overflow-y: auto;
        }

        body.dark-mode .sidebar {
            background: #1e1e2e;
            color: #e0e0e0;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-mode .sidebar-header {
            border-bottom-color: #404050;
        }

        .sidebar-header h2 {
            font-size: 18px;
            color: #333;
        }

        body.dark-mode .sidebar-header h2 {
            color: #e0e0e0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.dark-mode .close-btn {
            color: #e0e0e0;
        }

        .sidebar-content {
            padding: 20px;
        }

        .sidebar-links {
            list-style: none;
        }

        .sidebar-links li {
            margin-bottom: 15px;
        }

        .sidebar-links a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 5px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            font-weight: 500;
        }

        body.dark-mode .sidebar-links a {
            background: #2a2a3e;
            color: #e0e0e0;
        }

        .sidebar-links a:hover {
            background: #667eea;
            color: white;
            transform: translateX(5px);
        }

        .sidebar-links a::before {
            font-size: 18px;
        }

        .repo-link::before {
            content: "📦";
        }

        .github-link::before {
            content: "👤";
        }

        /* Help Button */
        .help-btn {
            position: fixed;
            left: 20px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            z-index: 998;
        }

        .help-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        /* Theme Toggle - Right Side */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "☀️";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:checked + .slider:before {
            content: "🌙";
            transform: translateX(26px);
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode .container {
            background: #1e1e2e;
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            transition: background 0.3s ease;
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        body.dark-mode .tab-btn {
            background: #2a2a3e;
            border-color: #404050;
            color: #b0b0b0;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        body.dark-mode label {
            color: #e0e0e0;
        }

        input[type="file"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s, background-color 0.3s, color 0.3s;
            background-color: white;
            color: #333;
        }

        body.dark-mode input[type="file"],
        body.dark-mode input[type="password"],
        body.dark-mode input[type="text"] {
            background-color: #2a2a3e;
            border-color: #404050;
            color: #e0e0e0;
        }

        input[type="file"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-label {
            display: block;
            padding: 12px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #667eea;
        }

        body.dark-mode .file-label {
            background: #2a2a3e;
            border-color: #667eea;
            color: #7b9aff;
        }

        .file-label:hover {
            background: #f0f0ff;
        }

        body.dark-mode .file-label:hover {
            background: #333347;
        }

        .file-name {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
            font-size: 14px;
            color: #666;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode .file-name {
            background: #2a2a3e;
            color: #b0b0b0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        body.dark-mode .message.success {
            background: #1b5e20;
            color: #81c784;
            border: 1px solid #2e7d32;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        body.dark-mode .message.error {
            background: #b71c1c;
            color: #ef5350;
            border: 1px solid #c62828;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        body.dark-mode .message.info {
            background: #01579b;
            color: #81d4fa;
            border: 1px solid #0277bd;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        body.dark-mode .loading {
            color: #7b9aff;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        body.dark-mode .spinner {
            border: 3px solid #404050;
            border-top: 3px solid #7b9aff;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-content {
            text-align: center;
        }

        .success-content h3 {
            color: #28a745;
            margin-bottom: 15px;
            font-size: 18px;
        }

        body.dark-mode .success-content h3 {
            color: #81c784;
        }

        .share-code {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #333;
            margin: 15px 0;
            font-size: 16px;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode .share-code {
            background: #2a2a3e;
            color: #e0e0e0;
        }

        .copy-btn {
            background: #28a745;
            font-size: 12px;
            padding: 8px;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .download-btn {
            background: #28a745;
            margin-top: 15px;
        }

        .download-btn:hover {
            background: #218838;
        }

        .download-link {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .download-link a {
            display: inline-block;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .download-link a:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }

        .countdown {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            transition: color 0.3s;
        }

        body.dark-mode .countdown {
            color: #b0b0b0;
        }

        /* Overlay for sidebar */
        .sidebar-overlay {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 998;
        }

        .sidebar-overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="close-btn" onclick="closeSidebar()">✕</button>
        </div>
        <div class="sidebar-content">
            <ul class="sidebar-links">
                <li><a href="https://github.com/LightningEX/file-transfer" target="_blank" class="repo-link">Repository</a></li>
                <li><a href="https://github.com/LightningEX" target="_blank" class="github-link">GitHub Profile</a></li>
            </ul>
        </div>
    </div>

    <!-- Help Button -->
    <button class="help-btn" onclick="toggleSidebar()" title="Open menu (?)">?</button>

    <!-- Theme Toggle - Right Side -->
    <div class="theme-toggle">
        <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="container">
        <div class="header">
            <h1>🔒 Secure File Transfer</h1>
            <p>Share files securely with password protection</p>
        </div>

        <div class="content">
            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('upload')">Upload & Share</button>
                <button class="tab-btn" onclick="switchTab('download')">Download File</button>
            </div>

            <!-- Upload Tab -->
            <div id="upload" class="tab-content active">
                <div id="uploadMessage" class="message"></div>

                <div id="uploadForm">
                    <div class="form-group">
                        <label for="fileInput">Select File</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="fileInput" onchange="displayFileName()">
                            <label for="fileInput" class="file-label">Click to select or drag & drop</label>
                        </div>
                        <div id="fileName" class="file-name"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Set Password</label>
                        <input type="password" id="password" placeholder="Enter a password" required>
                    </div>

                    <button onclick="uploadFile()">Upload & Generate Code</button>
                </div>

                <div id="uploadLoading" class="loading">
                    <div class="spinner"></div>
                    <p>Uploading file...</p>
                </div>

                <div id="uploadSuccess">
                </div>
            </div>

            <!-- Download Tab -->
            <div id="download" class="tab-content">
                <div id="downloadMessage" class="message"></div>

                <div id="downloadForm">
                    <div class="form-group">
                        <label for="shareCode">Enter Share Code</label>
                        <input type="text" id="shareCode" placeholder="Paste the share code here">
                    </div>

                    <div class="form-group">
                        <label for="downloadPassword">Enter Password</label>
                        <input type="password" id="downloadPassword" placeholder="Enter the password">
                    </div>

                    <button onclick="verifyPassword()">Verify & Download</button>
                </div>

                <div id="downloadLoading" class="loading">
                    <div class="spinner"></div>
                    <p>Verifying password...</p>
                </div>

                <div id="downloadLink" class="download-link">
                    <p style="margin-bottom: 10px; color: #333; font-weight: 600;">✅ File ready to download!</p>
                    <a id="downloadLinkElement" href="#" download>Didn't download? Click here to try again!</a>
                    <div class="countdown">Link will be available for <span id="countdown">3</span> seconds</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize dark mode from localStorage
        function initializeDarkMode() {
            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            const themeToggle = document.getElementById('themeToggle');
            
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                themeToggle.checked = true;
            }
        }

        // Dark mode toggle listener
        document.getElementById('themeToggle').addEventListener('change', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });

        // Sidebar functions
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        // Close sidebar when clicking overlay
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        // Keyboard shortcut for sidebar (Question mark)
        document.addEventListener('keydown', function(event) {
            if (event.key === '?') {
                toggleSidebar();
            }
        });

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initializeDarkMode);

        // Drag and drop functionality
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.querySelector('.file-label');

        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.background = '#f0f0ff';
        });

        fileLabel.addEventListener('dragleave', () => {
            fileLabel.style.background = '';
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.background = '';
            fileInput.files = e.dataTransfer.files;
            displayFileName();
        });

        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function displayFileName() {
            const file = fileInput.files[0];
            const fileNameDiv = document.getElementById('fileName');
            if (file) {
                fileNameDiv.textContent = `📄 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            } else {
                fileNameDiv.textContent = '';
            }
        }

        async function uploadFile() {
            const file = fileInput.files[0];
            const password = document.getElementById('password').value;
            const message = document.getElementById('uploadMessage');
            const form = document.getElementById('uploadForm');
            const loading = document.getElementById('uploadLoading');
            const success = document.getElementById('uploadSuccess');

            // Validation
            if (!file) {
                showMessage(message, 'Please select a file', 'error');
                return;
            }

            if (!password) {
                showMessage(message, 'Please enter a password', 'error');
                return;
            }

            if (file.size > 100 * 1024 * 1024) { // 100MB limit
                showMessage(message, 'File size must be less than 100MB', 'error');
                return;
            }

            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('password', password);

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                loading.style.display = 'none';
                success.innerHTML = `
                    <div class="success-content">
                        <h3>✅ File Uploaded Successfully!</h3>
                        <p>Share this code with the recipient:</p>
                        <div class="share-code">${data.code}</div>
                        <button class="copy-btn" onclick="copyToClipboard('${data.code}')">📋 Copy Code</button>
                        <p style="margin-top: 20px; color: #666; font-size: 12px;">The file will be automatically deleted after 24 hours or after successful download.</p>
                    </div>
                `;
                success.style.display = 'block';

                // Reset form
                setTimeout(() => {
                    fileInput.value = '';
                    document.getElementById('password').value = '';
                    displayFileName();
                }, 2000);

            } catch (error) {
                loading.style.display = 'none';
                form.style.display = 'block';
                showMessage(message, error.message, 'error');
            }
        }

        async function verifyPassword() {
            const shareCode = document.getElementById('shareCode').value;
            const password = document.getElementById('downloadPassword').value;
            const message = document.getElementById('downloadMessage');
            const form = document.getElementById('downloadForm');
            const loading = document.getElementById('downloadLoading');

            // Validation
            if (!shareCode) {
                showMessage(message, 'Please enter the share code', 'error');
                return;
            }

            if (!password) {
                showMessage(message, 'Please enter the password', 'error');
                return;
            }

            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: shareCode,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Verification failed');
                }

                // Trigger download
                const link = document.createElement('a');
                link.href = data.downloadUrl;
                link.download = data.filename;
                link.click();

                // Show download link after 3 seconds
                loading.style.display = 'none';
                showDownloadLink(data.downloadUrl, data.filename);

            } catch (error) {
                loading.style.display = 'none';
                form.style.display = 'block';
                showMessage(message, error.message, 'error');
            }
        }

        function showDownloadLink(downloadUrl, filename) {
            const downloadLinkDiv = document.getElementById('downloadLink');
            const downloadLinkElement = document.getElementById('downloadLinkElement');
            const countdownElement = document.getElementById('countdown');
            const message = document.getElementById('downloadMessage');

            downloadLinkElement.href = downloadUrl;
            downloadLinkElement.download = filename;
            
            // Show after 3 seconds
            setTimeout(() => {
                downloadLinkDiv.style.display = 'block';
                showMessage(message, 'File ready for download! You can download it again within the next 3 minutes.', 'info');
                
                // Start countdown from 180 seconds (3 minutes)
                let timeRemaining = 180;
                countdownElement.textContent = timeRemaining;
                
                const countdownInterval = setInterval(() => {
                    timeRemaining--;
                    countdownElement.textContent = timeRemaining;
                    
                    if (timeRemaining <= 0) {
                        clearInterval(countdownInterval);
                        downloadLinkDiv.style.display = 'none';
                        showMessage(message, 'Download link has expired. Please verify the code and password again.', 'error');
                    }
                }, 1000);
            }, 3000);

            // Reset form after showing link
            setTimeout(() => {
                document.getElementById('shareCode').value = '';
                document.getElementById('downloadPassword').value = '';
            }, 5000);
        }

        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Code copied to clipboard!');
            });
        }
    </script>
</body>
</html>
