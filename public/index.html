<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Transfer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="file"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="file"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-label {
            display: block;
            padding: 12px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: #667eea;
        }

        .file-label:hover {
            background: #f0f0ff;
        }

        .file-name {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
            font-size: 14px;
            color: #666;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-content {
            text-align: center;
        }

        .success-content h3 {
            color: #28a745;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .share-code {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #333;
            margin: 15px 0;
            font-size: 16px;
        }

        .copy-btn {
            background: #28a745;
            font-size: 12px;
            padding: 8px;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .download-btn {
            background: #28a745;
            margin-top: 15px;
        }

        .download-btn:hover {
            background: #218838;
        }

        .download-link {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .download-link a {
            display: inline-block;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .download-link a:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }

        .countdown {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Secure File Transfer</h1>
            <p>Share files securely with password protection</p>
        </div>

        <div class="content">
            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('upload')">Upload & Share</button>
                <button class="tab-btn" onclick="switchTab('download')">Download File</button>
            </div>

            <!-- Upload Tab -->
            <div id="upload" class="tab-content active">
                <div id="uploadMessage" class="message"></div>

                <div id="uploadForm">
                    <div class="form-group">
                        <label for="fileInput">Select File</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="fileInput" onchange="displayFileName()">
                            <label for="fileInput" class="file-label">Click to select or drag & drop</label>
                        </div>
                        <div id="fileName" class="file-name"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Set Password</label>
                        <input type="password" id="password" placeholder="Enter a password" required>
                    </div>

                    <button onclick="uploadFile()">Upload & Generate Code</button>
                </div>

                <div id="uploadLoading" class="loading">
                    <div class="spinner"></div>
                    <p>Uploading file...</p>
                </div>

                <div id="uploadSuccess">
                </div>
            </div>

            <!-- Download Tab -->
            <div id="download" class="tab-content">
                <div id="downloadMessage" class="message"></div>

                <div id="downloadForm">
                    <div class="form-group">
                        <label for="shareCode">Enter Share Code</label>
                        <input type="text" id="shareCode" placeholder="Paste the share code here">
                    </div>

                    <div class="form-group">
                        <label for="downloadPassword">Enter Password</label>
                        <input type="password" id="downloadPassword" placeholder="Enter the password">
                    </div>

                    <button onclick="verifyPassword()">Verify & Download</button>
                </div>

                <div id="downloadLoading" class="loading">
                    <div class="spinner"></div>
                    <p>Verifying password...</p>
                </div>

                <div id="downloadLink" class="download-link">
                    <p style="margin-bottom: 10px; color: #333; font-weight: 600;">✅ File ready to download!</p>
                    <a id="downloadLinkElement" href="#" download>📥 Download File</a>
                    <div class="countdown">Link will be available for <span id="countdown">3</span> seconds</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Drag and drop functionality
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.querySelector('.file-label');

        fileLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileLabel.style.background = '#f0f0ff';
        });

        fileLabel.addEventListener('dragleave', () => {
            fileLabel.style.background = '';
        });

        fileLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            fileLabel.style.background = '';
            fileInput.files = e.dataTransfer.files;
            displayFileName();
        });

        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function displayFileName() {
            const file = fileInput.files[0];
            const fileNameDiv = document.getElementById('fileName');
            if (file) {
                fileNameDiv.textContent = `📄 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            } else {
                fileNameDiv.textContent = '';
            }
        }

        async function uploadFile() {
            const file = fileInput.files[0];
            const password = document.getElementById('password').value;
            const message = document.getElementById('uploadMessage');
            const form = document.getElementById('uploadForm');
            const loading = document.getElementById('uploadLoading');
            const success = document.getElementById('uploadSuccess');

            // Validation
            if (!file) {
                showMessage(message, 'Please select a file', 'error');
                return;
            }

            if (!password) {
                showMessage(message, 'Please enter a password', 'error');
                return;
            }

            if (file.size > 100 * 1024 * 1024) { // 100MB limit
                showMessage(message, 'File size must be less than 100MB', 'error');
                return;
            }

            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('password', password);

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                loading.style.display = 'none';
                success.innerHTML = `
                    <div class="success-content">
                        <h3>✅ File Uploaded Successfully!</h3>
                        <p>Share this code with the recipient:</p>
                        <div class="share-code">${data.code}</div>
                        <button class="copy-btn" onclick="copyToClipboard('${data.code}')">📋 Copy Code</button>
                        <p style="margin-top: 20px; color: #666; font-size: 12px;">The file will be automatically deleted 3 minutes after successful download or after 24 hours.</p>
                    </div>
                `;
                success.style.display = 'block';

                // Reset form
                setTimeout(() => {
                    fileInput.value = '';
                    document.getElementById('password').value = '';
                    displayFileName();
                }, 2000);

            } catch (error) {
                loading.style.display = 'none';
                form.style.display = 'block';
                showMessage(message, error.message, 'error');
            }
        }

        async function verifyPassword() {
            const shareCode = document.getElementById('shareCode').value;
            const password = document.getElementById('downloadPassword').value;
            const message = document.getElementById('downloadMessage');
            const form = document.getElementById('downloadForm');
            const loading = document.getElementById('downloadLoading');

            // Validation
            if (!shareCode) {
                showMessage(message, 'Please enter the share code', 'error');
                return;
            }

            if (!password) {
                showMessage(message, 'Please enter the password', 'error');
                return;
            }

            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: shareCode,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Verification failed');
                }

                // Trigger download
                const link = document.createElement('a');
                link.href = data.downloadUrl;
                link.download = data.filename;
                link.click();

                // Show download link after 3 seconds
                loading.style.display = 'none';
                showDownloadLink(data.downloadUrl, data.filename);

            } catch (error) {
                loading.style.display = 'none';
                form.style.display = 'block';
                showMessage(message, error.message, 'error');
            }
        }

        function showDownloadLink(downloadUrl, filename) {
            const downloadLinkDiv = document.getElementById('downloadLink');
            const downloadLinkElement = document.getElementById('downloadLinkElement');
            const countdownElement = document.getElementById('countdown');
            const message = document.getElementById('downloadMessage');

            downloadLinkElement.href = downloadUrl;
            downloadLinkElement.download = filename;
            
            // Show after 3 seconds
            setTimeout(() => {
                downloadLinkDiv.style.display = 'block';
                showMessage(message, 'File ready for download! You can download it again within the next 3 minutes.', 'info');
                
                // Start countdown from 180 seconds (3 minutes)
                let timeRemaining = 180;
                countdownElement.textContent = timeRemaining;
                
                const countdownInterval = setInterval(() => {
                    timeRemaining--;
                    countdownElement.textContent = timeRemaining;
                    
                    if (timeRemaining <= 0) {
                        clearInterval(countdownInterval);
                        downloadLinkDiv.style.display = 'none';
                        showMessage(message, 'Download link has expired. Please verify the code and password again.', 'error');
                    }
                }, 1000);
            }, 3000);

            // Reset form after showing link
            setTimeout(() => {
                document.getElementById('shareCode').value = '';
                document.getElementById('downloadPassword').value = '';
            }, 5000);
        }

        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Code copied to clipboard!');
            });
        }
    </script>
</body>
</html>
